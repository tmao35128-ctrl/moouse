# fly.toml app configuration file generated for nova-line-bot on 2026-04-01T22:05:59+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nova-line-bot'
primary_region = 'nrt'

[build]

[env]
  DATA_DIR = '/data'

[[mounts]]
  source = 'nova_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
